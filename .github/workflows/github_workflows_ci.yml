name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project from project.yml
      run: xcodegen

    - name: Build for iOS Simulator (Debug)
      run: |
        xcodebuild build \
          -scheme Dictee \
          -sdk iphonesimulator \
          -configuration Debug \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO

    - name: Build for iOS Simulator (Release)
      run: |
        xcodebuild build \
          -scheme Dictee \
          -sdk iphonesimulator \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO